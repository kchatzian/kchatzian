name: Update GitHub Activity Card

on:
  workflow_dispatch:
  schedule:
    - cron: "31 6 * * *"
  push:
    paths:
      - scripts/fetch_github_activity.py
      - scripts/generate_github_activity_card.py
      - data/github-activity.json

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PROFILE_REPO_PAT || github.token }}
      GITHUB_USERNAME: kchatzian

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch GitHub activity
        run: python3 scripts/fetch_github_activity.py

      - name: Generate activity card
        run: python3 scripts/generate_github_activity_card.py

      - name: Commit generated activity
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update GitHub activity card
          file_pattern: data/github-activity.json assets/github-activity.svg
