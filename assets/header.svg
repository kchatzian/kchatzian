<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020">
        <animate attributeName="stop-color" values="#0B1020;#0E172A;#0B1020" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.52" stop-color="#101827">
        <animate attributeName="stop-color" values="#101827;#132033;#101827" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#061B1F">
        <animate attributeName="stop-color" values="#061B1F;#111827;#061B1F" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="40" x2="1040" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00C2A8"/>
      <stop offset="0.48" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
      <animate attributeName="x1" values="120;320;120" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1100;940;1100" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.76 0 0 0 0 0.66 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#263244" stroke-width="1" opacity="0.6"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0 0;40 0;0 0" dur="18s" repeatCount="indefinite"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)" opacity="0.28"/>

  <g opacity="0.85">
    <path d="M-40 252C120 158 230 170 358 206C501 246 577 238 710 151C850 59 994 54 1240 121" stroke="url(#accent)" stroke-width="2" opacity="0.55" stroke-dasharray="520 760">
      <animate attributeName="stroke-dashoffset" values="0;-1280" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.75;0.35" dur="7s" repeatCount="indefinite"/>
    </path>
    <path d="M-20 278C150 209 272 216 391 249C539 290 649 263 772 180C922 79 1021 88 1220 174" stroke="url(#accent)" stroke-width="1.4" opacity="0.3" stroke-dasharray="360 620">
      <animate attributeName="stroke-dashoffset" values="-980;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.52;0.2" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <circle cx="936" cy="92" r="86" fill="#00C2A8" opacity="0.08" filter="url(#glow)">
    <animate attributeName="r" values="76;98;76" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.14;0.05" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="226" r="104" fill="#A78BFA" opacity="0.08" filter="url(#glow)">
    <animate attributeName="r" values="92;116;92" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.13;0.05" dur="7s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(74 62)">
    <animateTransform attributeName="transform" type="translate" values="74 62;74 56;74 62" dur="5s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="88" height="88" rx="20" fill="#111827" stroke="#314154"/>
    <path d="M28 58V31.5L44 22L60 31.5V58L44 67.5L28 58Z" stroke="#00C2A8" stroke-width="5" stroke-linejoin="round" stroke-dasharray="190" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="190;0;0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M44 22V67" stroke="#38BDF8" stroke-width="5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="6s" repeatCount="indefinite"/>
    <text x="74" y="198" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">Konstantinos Chatzianastasiou</text>
    <text x="76" y="238" fill="#93A4B8" font-family="JetBrains Mono, Consolas, monospace" font-size="22">Java &amp; Go Developer • Automation Engineer • Backend Systems</text>
    <text x="76" y="274" fill="#00C2A8" font-family="JetBrains Mono, Consolas, monospace" font-size="20">Zone01 Student • Aspiring AI Engineer • Athens, Greece</text>
  </g>

  <g transform="translate(825 208)" font-family="JetBrains Mono, Consolas, monospace" font-size="15" fill="#CBD5E1">
    <rect x="0" y="0" width="280" height="58" rx="12" fill="#0B1220" stroke="#2A3A4D"/>
    <circle cx="26" cy="29" r="6" fill="#00C2A8">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="44" y="25">build: practical systems</text>
    <text x="44" y="44" fill="#7DD3FC">status: learning in public</text>
  </g>
</svg>
